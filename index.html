<html>
  <head>
    <title>Simon Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="simon.css">
  </head>
  <body>
    <div class="app">
      <div class="audio-control">
        <audio src="assets/bgMusic.mpeg" id="bgMusic"></audio>

        <button id="audioBtn">
          <img src="assets/musicOn.jpg" id="audioIcon" alt="Toggle Music">
        </button>
      </div>
      <h1 class="title">Simon Game</h1>

      <div class="score-card">
        <p>Level: <span id="level">1</span></p>
        <p>Score: <span id="score">0</span></p>
      </div>

      <div class="status" id="status">Press Start to begin</div>

      <div class="game-board">
        <button class="color-pad green" id="green">Green</button>
        <button class="color-pad red" id="red">Red</button>
        <button class="color-pad blue" id="blue">Blue</button>
        <button class="color-pad yellow" id="yellow">Yellow</button>
      </div>

      <div class="controls">
        <button class="btn start-btn" id="startBtn">Start</button>
        <button class="btn reset-btn" id="resetBtn">Reset</button>
      </div>


    </div>
  <script src="simon.js"></script>
  </body>
</html>
