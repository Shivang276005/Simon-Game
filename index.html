<html>
  <head>
    <title>Simon Game</title>
    <link rel="stylesheet" href="simon.css">
  </head>
  <body>
    <div class="container">
      <h1 class="title">Simon Game</h1>
      
      <div class="game-board">
        <div class="color-pad red" id="red"></div>
        <div class="color-pad green" id="green"></div>
        <div class="color-pad blue" id="blue"></div>
        <div class="color-pad yellow" id="yellow"></div>
      </div>
      
      <div class="controls">
        <div class="info">
          <p class="label">Level: <span id="level">0</span></p>
          <p class="label">Score: <span id="score">0</span></p>
        </div>
        
        <button class="btn start-btn" id="startBtn">Start Game</button>
        <button class="btn reset-btn" id="resetBtn">Reset</button>
      </div>
      
      <div class="status" id="status">Press Start to begin</div>
    </div>
    
    <script src="simon.js"></script>
  </body>
</html>
